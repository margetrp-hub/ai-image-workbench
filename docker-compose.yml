services:
  image-sub2api-studio:
    build:
      context: .
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        STUDIO_BASE_PATH: ${STUDIO_BASE_PATH:-/}
        VITE_SUB2API_BASE_URL: ${VITE_SUB2API_BASE_URL:-}
        VITE_SUB2API_GATEWAY_BASE_URL: ${VITE_SUB2API_GATEWAY_BASE_URL:-}
        VITE_SUB2API_IMAGE_ROUTE: ${VITE_SUB2API_IMAGE_ROUTE:-responses}
        VITE_SUB2API_RESPONSES_MODEL: ${VITE_SUB2API_RESPONSES_MODEL:-gpt-5.5}
        VITE_SUB2API_RESPONSES_PARTIAL_IMAGES: ${VITE_SUB2API_RESPONSES_PARTIAL_IMAGES:-2}
        VITE_SUB2API_LOGIN_URL: ${VITE_SUB2API_LOGIN_URL:-}
        VITE_STUDIO_HISTORY_BASE_URL: ${VITE_STUDIO_HISTORY_BASE_URL:-}
        VITE_STUDIO_BACK_URL: ${VITE_STUDIO_BACK_URL:-/}
        VITE_STUDIO_LIBRARY_AUTH_REQUIRED: ${VITE_STUDIO_LIBRARY_AUTH_REQUIRED:-false}
    image: image-sub2api-studio:local
    ports:
      - "${STUDIO_PORT:-8080}:80"
    restart: unless-stopped
