server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index studio.html;
  absolute_redirect off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location = / {
    return 302 /studio/;
  }

  location /studio/ {
    try_files $uri $uri/ /studio.html;
  }

  location /studio/studio-assets/ {
    alias /usr/share/nginx/html/studio-assets/;
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location ~ ^/studio/(cases\.json|inspirations\.json|inspiration-sources\.json|style-library\.json|favicon\.svg)$ {
    rewrite ^/studio/(.*)$ /$1 break;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|json)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }
}
